{% extends "base.html" %}

{% block content %}

<h3>ITM Dashboard</h3>

<select id="timeframe" class="form-select" style="width:120px; margin-bottom:15px;">

    <option value="5m">5m</option>
    <option value="15m">15m</option>
    <option value="30m">30m</option>
    <option value="1hr">1hr</option>

</select>

<h5>
    Spot:
    <span id="spot-price">0</span>
</h5>

<h5>
    Data Date:
    <span id="last-update" style="color: #ffc107;">--</span>
</h5>

<div class="grid-container">

    <!-- ITM 50 CE -->

    <div class="table-card">

        <h5 class="ce-header p-2">
            ITM -50 CE - <span id="itm50-ce-strike"></span>
        </h5>

        <div class="table-scroll">

            <table class="table table-dark table-hover">

                <thead>

                    <tr>

                        <th>Time</th>
                        <th>Build</th>
                        <th>Vol</th>
                        <th>Delta</th>
                        <th>Gamma</th>
                        <th>IV</th>

                    </tr>

                </thead>

                <tbody id="itm50-ce-body"></tbody>

            </table>

        </div>

    </div>

    <!-- ITM 50 PE -->

    <div class="table-card">

        <h5 class="pe-header p-2">
            ITM -50 PE - <span id="itm50-pe-strike"></span>
        </h5>

        <div class="table-scroll">

            <table class="table table-dark table-hover">

                <thead>

                    <tr>

                        <th>Time</th>
                        <th>Build</th>
                        <th>Vol</th>
                        <th>Delta</th>
                        <th>Gamma</th>
                        <th>IV</th>

                    </tr>

                </thead>

                <tbody id="itm50-pe-body"></tbody>

            </table>

        </div>

    </div>

    <!-- ITM 100 CE -->

    <div class="table-card">

        <h5 class="ce-header p-2">
            ITM -100 CE - <span id="itm100-ce-strike"></span>
        </h5>

        <div class="table-scroll">

            <table class="table table-dark table-hover">

                <thead>

                    <tr>

                        <th>Time</th>
                        <th>Build</th>
                        <th>Vol</th>
                        <th>Delta</th>
                        <th>Gamma</th>
                        <th>IV</th>

                    </tr>

                </thead>

                <tbody id="itm100-ce-body"></tbody>

            </table>

        </div>

    </div>

    <!-- ITM 100 PE -->

    <div class="table-card">

        <h5 class="pe-header p-2">
            ITM -100 PE - <span id="itm100-pe-strike"></span>
        </h5>

        <div class="table-scroll">

            <table class="table table-dark table-hover">

                <thead>

                    <tr>

                        <th>Time</th>
                        <th>Build</th>
                        <th>Vol</th>
                        <th>Delta</th>
                        <th>Gamma</th>
                        <th>IV</th>

                    </tr>

                </thead>

                <tbody id="itm100-pe-body"></tbody>

            </table>

        </div>

    </div>

</div>

<script src="/static/js/itm.js?v=20260530-change-colors"></script>

{% endblock %}
