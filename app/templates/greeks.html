{% extends "base.html" %}

{% block content %}

<h3>Fixed-Strike Greeks Dashboard</h3>

<div class="mb-3">
    <span class="badge-green">Interval: 5m</span>
    <span class="badge-yellow ms-2">Spot: <strong id="spot-price">0</strong></span>
    <span class="badge-blue ms-2">Opening ATM: <strong id="opening-atm">--</strong></span>
</div>

<div class="mb-3">

    <label>Select Strike</label>

    <select
        id="strike-select"
        class="form-select"
        style="max-width:250px;">
    </select>

</div>

<div class="table-card">

    <h4 class="p-2"
        style="background:#facc15;color:black;">
        CE Delta + Gamma Spikes
    </h4>

    <table class="table table-dark">

        <thead>

            <tr>
                <th>Time</th>
                <th>LTP</th>
                <th>Delta</th>
                <th>Delta %</th>
                <th>Gamma</th>
                <th>Gamma %</th>
            </tr>

        </thead>

        <tbody id="ce-spikes-body"></tbody>

    </table>

</div>

<br>

<div class="table-card">

    <h4 class="p-2"
        style="background:#facc15;color:black;">
        PE Delta + Gamma Spikes
    </h4>

    <table class="table table-dark">

        <thead>

            <tr>
                <th>Time</th>
                <th>LTP</th>
                <th>Delta</th>
                <th>Delta %</th>
                <th>Gamma</th>
                <th>Gamma %</th>
            </tr>

        </thead>

        <tbody id="pe-spikes-body"></tbody>

    </table>

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/greeks.js?v=20260606_1"></script>

{% endblock %}
